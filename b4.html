<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Someone Special 💖</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden;
  font-family: 'Segoe UI', sans-serif;
  background: black;
}

/* PAGE SYSTEM */
.page {
  display: none;
  position: absolute;
  width: 100%;
  height: 100%;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
}

.active { display: flex; }

/* PAGE 1 */
#page1 {
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  color: white;
}

.timer {
  font-size: 60px;
}

/* PAGE 2 */
#page2 {
  background: black;
  color: white;
  overflow: hidden;
}

h1 {
  font-size: 50px;
  text-shadow: 0 0 20px pink;
}

.message {
  font-size: 20px;
  max-width: 600px;
  margin: 20px auto;
}

/* PHOTO */
.photo {
  margin-top: 20px;
}

.photo img {
  width: 220px;
  border-radius: 20px;
  box-shadow: 0 0 25px pink;
}

/* QUESTION */
.question {
  margin-top: 20px;
  font-size: 22px;
}

/* BUTTONS */
.btns {
  margin-top: 15px;
}
#noBtn {
  position: relative;
}
button {
  padding: 10px 20px;
  margin: 5px;
  border: none;
  border-radius: 25px;
  background: pink;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

/* PAGE 3 */
#page3 {
  background: radial-gradient(circle at top, #1a1a40, #000);
  color: white;
  overflow: hidden;
}

.gallery {
  display: grid;
  grid-template-columns: repeat(2, 150px);
  gap: 15px;
  margin-top: 20px;
}

.gallery img {
  width: 150px;
  height: 150px;
  object-fit: cover;
  border-radius: 15px;
  box-shadow: 0 0 20px pink;
}

/* FLOATING HEARTS */
.heart {
  position: absolute;
  animation: float 6s linear infinite;
}

@keyframes float {
  from { transform: translateY(100vh); opacity:1; }
  to { transform: translateY(-10vh); opacity:0; }
}
</style>
</head>

<body>

<!-- PAGE 1 -->
<div id="page1" class="page active">
  <div class="timer" id="timer">00:05</div>
  <p>A surprise is waiting 💖</p>
</div>

<!-- PAGE 2 -->
<div id="page2" class="page">

  <h1>Happy Birthday, My Love 💖</h1>

  <div class="message">
    You are the most beautiful part of my life.  
    Every moment with you is special.  
    I’m so lucky to have you ❤️  
    <br><br>
    — Kiran Kumar Kella
  </div>

  <div class="photo">
    <img src="https://images.pexels.com/photos/415829/pexels-photo-415829.jpeg">
  </div>

  <div class="question">Do you love me? 💖</div>

  <div class="btns">
    <button onclick="playMusic(); goToPage3()">Yes 💖</button>
    <button id="noBtn">No 😅</button>
  </div>

</div>

<!-- PAGE 3 -->
<div id="page3" class="page">

  <h1>Our Memories 💖</h1>

  <div class="gallery">
    <img src="https://images.pexels.com/photos/1239291/pexels-photo-1239291.jpeg">
    <img src="https://images.pexels.com/photos/774909/pexels-photo-774909.jpeg">
    <img src="https://images.pexels.com/photos/1024993/pexels-photo-1024993.jpeg">
    <img src="https://images.pexels.com/photos/415829/pexels-photo-415829.jpeg">
  </div>

</div>

<script>

/* TIMER */
let time = 10;
let timerEl = document.getElementById("timer");

let countdown = setInterval(() => {
  timerEl.innerHTML = "00:" + String(time).padStart(2,'0');
  time--;

  if (time < 0) {
    clearInterval(countdown);
    showPage2();
  }
}, 1000);

/* PAGE SWITCH */
function showPage2() {
  page1.classList.remove("active");
  page2.classList.add("active");
  createHearts();
}

function goToPage3() {
  page2.classList.remove("active");
  page3.classList.add("active");
  createHearts();
}

/* HEART ANIMATION */
function createHearts() {
  setInterval(() => {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (15 + Math.random() * 20) + "px";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 6000);
  }, 400);
}
function playMusic() {
  let music = document.getElementById("bgMusic");
  music.volume = 0.5; // soft romantic volume
  music.play().catch(() => {});
}

const noBtn = document.getElementById("noBtn");

noBtn.addEventListener("mouseover", moveButton);
noBtn.addEventListener("click", moveButton);

function moveButton() {
  const btnWidth = noBtn.offsetWidth;
  const btnHeight = noBtn.offsetHeight;

  const maxX = window.innerWidth - btnWidth - 20;
  const maxY = window.innerHeight - btnHeight - 20;

  const randomX = Math.random() * maxX;
  const randomY = Math.random() * maxY;

  noBtn.style.position = "absolute";
  noBtn.style.left = randomX + "px";
  noBtn.style.top = randomY + "px";
}
</script>
<audio id="bgMusic" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b7c0b.mp3" type="audio/mpeg">
</audio>

</body>
</html>
